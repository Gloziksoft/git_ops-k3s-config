apiVersion: apps/v1
kind: Deployment
metadata:
  name: booking-app-deployment
  namespace: booking-app
  labels:
    app: booking-app

spec:
  replicas: 1

  selector:
    matchLabels:
      app: booking-app

  template:
    metadata:
      labels:
        app: booking-app

    spec:
      imagePullSecrets:
        - name: ghcr-login-secret

      terminationGracePeriodSeconds: 30

      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z postgresql-service 5432; do
                echo "Waiting for PostgreSQL..."
                sleep 3
              done

      containers:
        - name: booking-app-container
          image: ghcr.io/gloziksoft/booking-app:prod
          ports:
            - containerPort: 8080

          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"

          # 🔥 TU JE FIX
          envFrom:
            - secretRef:
                name: booking-mail-secret

          env:
            # --- DATABASE ---
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://postgresql-service:5432/booking_db

            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: postgresql-secret
                  key: postgresql-user

            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgresql-secret
                  key: postgresql-password

            # --- APP PROFILE ---
            - name: SPRING_PROFILES_ACTIVE
              value: prod

          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 10

          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 10
